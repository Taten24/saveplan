{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h2>Cash Accounts</h2>
  <form method="post">
    <div class="grid">
      <div><label>Account Name</label><input name="account_name" required></div>
      <div><label>Type</label><select name="account_type"><option>Wallet</option><option>Bank</option><option>Mobile Money</option><option>Other</option></select></div>
      <div><label>Balance</label><input type="number" step="0.01" name="balance" value="0"></div>
    </div>
    <br><button type="submit">Save Account</button>
  </form>
</div>
<div class="card">
  <table>
    <tr><th>Account</th><th>Type</th><th>Balance</th></tr>
    {% for row in rows %}
    <tr><td>{{ row.account_name }}</td><td>{{ row.account_type }}</td><td>${{ '%.2f'|format(row.balance) }}</td></tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
